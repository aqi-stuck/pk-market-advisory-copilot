services:
  - type: web
    name: market-advisory-api
    runtime: docker
    repo: https://github.com/aqi-stuck/US-market-advisory-copilot
    plan: free
    region: oregon # Choose your preferred region
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: market-advisory-db
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: PORT
        value: 8000
      - key: QDRANT_URL
        sync: false # Set this in the Render Dashboard
      - key: GITHUB_TOKEN
        sync: false # Your API key for GitHub Models
      - key: GITHUB_MODELS_BASE_URL
        value: https://models.inference.ai.azure.com
      - key: CHAT_MODEL_NAME # Renamed to GITHUB_CHAT_MODEL_NAME in config, but Render uses this for the env var
        value: gpt-4o-mini
      - key: AZURE_OPENAI_API_KEY
        sync: false # Your API key for Azure OpenAI (for embeddings)
      - key: AZURE_OPENAI_ENDPOINT
        sync: false # Your Azure OpenAI endpoint (for embeddings)
      - key: AZURE_OPENAI_API_VERSION
        value: 2024-02-01
      - key: API_KEY
        sync: false

databases:
  - name: market-advisory-db
    databaseName: market_advisory
    user: market_user
    plan: free
    region: oregon