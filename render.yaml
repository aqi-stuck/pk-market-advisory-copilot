services:
  - type: web
    name: market-advisory-api
    runtime: docker
    repo: https://github.com/aqi-stuck/US-market-advisory-copilot
    plan: free
    region: oregon # Choose your preferred region
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: market-advisory-db
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: PORT
        value: 8000
      - key: QDRANT_URL
        sync: false # Set this in the Render Dashboard
      - key: GITHUB_TOKEN
        sync: false
      - key: AZURE_OPENAI_API_KEY
        sync: false

databases:
  - name: market-advisory-db
    databaseName: market_advisory
    user: market_user
    plan: free
    region: oregon