[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[variables]
ENVIRONMENT = "production"
# NOTE: DATABASE_URL, QDRANT_URL, and Secrets should be linked via the 
# Railway Dashboard 'Variables' tab to avoid service name mismatch errors.

[deploy]
startCommand = "sh -c 'sleep 5 && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT'"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
